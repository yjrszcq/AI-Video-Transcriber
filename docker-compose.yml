services:
  ai-video-transcriber:
    build: .
    image: ai-video-transcriber:latest
    container_name: ai-video-transcriber
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # 可选：服务端默认OpenAI API密钥（请在.env文件中设置或直接修改，不设置时可在页面 AI Settings 中填写）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key_here}
      # 可选：自定义OpenAI端点
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # 可选，文本处理模型配置
      - OPENAI_OPTIMIZE_MODEL=${OPENAI_OPTIMIZE_MODEL:-gpt-4o-mini}
      # 可选，摘要模型配置
      - OPENAI_SUMMARY_MODEL=${OPENAI_SUMMARY_MODEL:-gpt-4o}
      # 可选，翻译模型配置
      - OPENAI_TRANSLATION_MODEL=${OPENAI_TRANSLATION_MODEL:-gpt-4o-mini}
      # 可选：Whisper模型大小
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      # 可选：本地上传单文件大小上限（MB），与本地环境变量一致
      - UPLOAD_MAX_MB=${UPLOAD_MAX_MB:-200}
      # 可选：SSE心跳间隔（秒），降低长任务前端连接被代理切断的概率
      - SSE_HEARTBEAT_SECONDS=${SSE_HEARTBEAT_SECONDS:-10}
      # 可选：设为true时用镜像内预置模型覆盖运行期同名缓存，用于修复损坏缓存
      - REPAIR_PRELOADED_HF_CACHE=${REPAIR_PRELOADED_HF_CACHE:-false}
    volumes:
      # 运行期模型缓存。入口脚本会合并镜像内预置模型，默认不覆盖已有文件。
      - ./models/huggingface:/data/huggingface
    # 如需持久化任务输出，可额外挂载：
    # - ./temp:/app/temp
    restart: unless-stopped
    
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
