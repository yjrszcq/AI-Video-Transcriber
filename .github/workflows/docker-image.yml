name: Build and Push Docker Images

on:
  workflow_dispatch:

env:
  IMAGE_OWNER: szcq
  IMAGE_NAME: ai-video-transcriber

jobs:
  build-standard:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.IMAGE_OWNER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push standard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PRELOAD_WHISPER_MODELS=none
          tags: |
            ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:standard
            ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest

  build-with-base:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.IMAGE_OWNER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push with-base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PRELOAD_WHISPER_MODELS=base
          tags: |
            ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:with-base

  build-with-all-whisper:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.IMAGE_OWNER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push with-all-whisper image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PRELOAD_WHISPER_MODELS=all
          tags: |
            ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:with-all-whisper